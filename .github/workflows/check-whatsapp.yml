name: Check WhatsApp Status
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Instance Status
        run: |
          STATUS=$(curl -s -H "apikey: enemeop_evo_key_2026" https://enemeop-evolution.onrender.com/instance/fetchInstances)
          echo "Instances: $STATUS"
      - name: Check Webhook Config
        run: |
          WH=$(curl -s -H "apikey: enemeop_evo_key_2026" https://enemeop-evolution.onrender.com/webhook/find/floricultura)
          echo "Webhook: $WH"
      - name: Check Connection State
        run: |
          CONN=$(curl -s -H "apikey: enemeop_evo_key_2026" https://enemeop-evolution.onrender.com/instance/connectionState/floricultura)
          echo "Connection: $CONN"
