name: Keep Render Services Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Orchestrator
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://enemeop-orchestrator.onrender.com/)
          echo "Orchestrator: $STATUS"

      - name: Ping WhatsApp Bridge
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://enemeop-whatsapp-bridge.onrender.com/)
          echo "WhatsApp Bridge: $STATUS"
