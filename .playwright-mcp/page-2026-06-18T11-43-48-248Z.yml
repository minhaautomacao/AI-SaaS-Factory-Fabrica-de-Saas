        - generic [ref=e607]:
          - generic [ref=e609]:
            - generic [ref=e610]: Com a permissão whatsapp_business_management , seu aplicativo pode ler e/ou gerenciar ativos de negócios do WhatsApp que você possui ou aos quais outras empresas concederam acesso a você por meio dessa permissão. Esses ativos comerciais incluem contas empresariais do WhatsApp, telefones, modelos de mensagem, códigos QR e mensagens associadas e assinaturas de webhook. O uso permitido dela serve para gerenciar ativos comerciais do WhatsApp e exibir análises da conta do WhatsApp Business no seu portal do cliente. Você também pode usar essa permissão para solicitar informações de análise com o objetivo de aprimorar seu app e para fins de marketing ou publicidade, por meio do uso de informações agregadas e anônimas ou sem identificação (desde que esses dados não possam ser identificados novamente).
