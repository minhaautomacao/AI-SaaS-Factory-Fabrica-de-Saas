      - generic [ref=e1513]:
        - generic [ref=e1515]:
          - generic [ref=e1517]:
            - generic [ref=e1518]: Com a permissão whatsapp_business_management , seu aplicativo pode ler e/ou gerenciar ativos de negócios do WhatsApp que você possui ou aos quais outras empresas concederam acesso a você por meio dessa permissão. Esses ativos comerciais incluem contas empresariais do WhatsApp, telefones, modelos de mensagem, códigos QR e mensagens associadas e assinaturas de webhook. O uso permitido dela serve para gerenciar ativos comerciais do WhatsApp e exibir análises da conta do WhatsApp Business no seu portal do cliente. Você também pode usar essa permissão para solicitar informações de análise com o objetivo de aprimorar seu app e para fins de marketing ou publicidade, por meio do uso de informações agregadas e anônimas ou sem identificação (desde que esses dados não possam ser identificados novamente).
            - generic [ref=e1519]:
              - generic [ref=e1520]:
                - text: Forneça uma descrição detalhada de como seu aplicativo usa a permissão ou o recurso solicitado, como ele agrega valor para uma pessoa que usa seu aplicativo e por que é necessário para a funcionalidade do aplicativo.
                - button "[?]" [ref=e1521] [cursor=pointer]:
                  - superscript [ref=e1522]: "[?]"
              - textbox [ref=e1523]: Enemeop Flores é uma floricultura que usa este app para gerenciar sua conta WhatsApp Business. O app acessa configurações da conta comercial do WhatsApp (número de telefone, perfil e status de verificação) para exibir informações no painel administrativo da floricultura. O recurso whatsapp_business_management é necessário para verificar o status da conta, consultar o número associado e garantir que as mensagens automáticas de atendimento ao cliente sejam enviadas a partir da conta correta. Não armazenamos dados além do necessário para o funcionamento do painel interno.
