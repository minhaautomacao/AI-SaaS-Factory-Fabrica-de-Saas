[app]
name = "enemeop-whatsapp-bridge"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  EVOLUTION_INSTANCE = "floricultura"
  ORCHESTRATOR_WEBHOOK = "https://gftnjvdvzgjkhwxnxnwl.supabase.co/functions/v1/webhook-meta"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
